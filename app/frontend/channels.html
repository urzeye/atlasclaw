<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="channel.title">渠道管理 - AtlasClaw</title>
    <link rel="stylesheet" href="/styles/main.css?v=7">
    <script type="module" src="/scripts/channel-manager.js?v=7"></script>
</head>
<body>
    <!-- Left Sidebar (same as index.html) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="new-chat-btn">
                <span>←</span>
                <span data-i18n="channel.backToChat">返回对话</span>
            </a>
        </div>
        <div class="sidebar-content">
            <div class="chat-history-group">
                <div class="group-title" data-i18n="channel.available">可用渠道</div>
                <div id="sidebarChannelList" class="sidebar-channel-list">
                    <!-- Channel type items will be rendered here -->
                </div>
            </div>
        </div>
        <div class="sidebar-footer">
            <a href="/channels.html" class="settings-btn active">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span data-i18n="app.channels">渠道管理</span>
            </a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <header class="chat-header">
            <h1 data-i18n="channel.title">渠道管理</h1>
        </header>
        
        <div class="channel-content">
            <!-- Channel List View (default) -->
            <div id="channelListView">
                <section class="channel-section">
                    <h2 class="section-title" data-i18n="channel.available">可用渠道</h2>
                    <p class="section-desc" data-i18n="channel.selectToConfig">选择一个渠道类型进行配置</p>
                    <div class="channel-types" id="channelTypes">
                        <div class="channel-loading" data-i18n="channel.loading">加载中...</div>
                    </div>
                </section>
            </div>
            
            <!-- Channel Detail View (shown when ?type=xxx) -->
            <div id="channelDetailView" style="display: none;">
                <!-- Content will be rendered dynamically -->
            </div>
        </div>
    </main>
    
    <!-- Delete Confirm Dialog -->
    <div id="deleteDialog" class="confirm-dialog hidden">
        <div class="confirm-content">
            <h3 data-i18n="channel.deleteConfirmTitle">确认删除</h3>
            <p id="deleteMessage" data-i18n="channel.deleteConfirm">确定要删除这个连接吗？</p>
            <div class="confirm-buttons">
                <button class="btn-cancel" id="btnCancelDelete" data-i18n="channel.cancel">取消</button>
                <button class="btn-confirm" id="btnConfirmDelete" data-i18n="channel.delete">删除</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>
</body>
</html>
